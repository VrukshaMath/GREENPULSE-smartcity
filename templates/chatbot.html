<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SavvyStreet AI — Chat Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0f0d;
      --panel:     #111714;
      --card:      #151c18;
      --border:    rgba(57,211,83,0.15);
      --border-hi: rgba(57,211,83,0.4);
      --mint:      #39d353;
      --mint-dim:  #1f7a30;
      --mint-glow: rgba(57,211,83,0.18);
      --text:      #e8f0ea;
      --text-2:    #8fa895;
      --text-3:    #4a6050;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    /* ── Layout ───────────────────────────── */
    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 640px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ────────────────────────────── */
    .chat-page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ai-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--mint), var(--mint-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--mint-glow);
    }

    .ai-meta {}
    .ai-name {
      font-family: var(--display);
      font-weight: 700;
      font-size: 0.9rem;
    }
    .ai-sub {
      font-size: 0.68rem;
      color: var(--text-3);
    }

    .ai-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: var(--mint);
    }

    .ai-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); }
      50%      { opacity:0.4; transform: scale(0.75); }
    }

    /* ── Suggested prompts ─────────────────── */
    .suggestions-bar {
      display: flex;
      gap: 7px;
      padding: 10px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .suggestions-bar::-webkit-scrollbar { display: none; }

    .suggestion-chip {
      padding: 5px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.7rem;
      color: var(--text-2);
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      border-color: var(--border-hi);
      color: var(--mint);
    }

    /* ── Messages ──────────────────────────── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--mint-dim) transparent;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }

    .msg-avatar.ai-av {
      background: linear-gradient(135deg, var(--mint), var(--mint-dim));
      color: var(--bg);
      font-weight: 700;
    }

    .msg-avatar.user-av {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.82rem;
      line-height: 1.6;
      animation: pop-in 0.2s ease;
    }

    @keyframes pop-in {
      from { opacity:0; transform: scale(0.93); }
      to   { opacity:1; transform: scale(1); }
    }

    .msg-bubble.ai {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-2);
    }

    .msg-bubble.user {
      background: rgba(57,211,83,0.1);
      border: 1px solid rgba(57,211,83,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg-bubble.typing { color: var(--text-3); font-style: italic; }

    .msg-time {
      font-size: 0.6rem;
      color: var(--text-3);
      padding: 0 4px;
      align-self: flex-end;
    }

    /* ── Input Area ────────────────────────── */
    .input-area {
      padding: 14px 20px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-textarea {
      flex: 1;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      transition: all 0.2s;
    }

    .chat-textarea::placeholder { color: var(--text-3); }

    .chat-textarea:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px var(--mint-glow);
    }

    .btn-send {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--mint);
      border: none;
      color: var(--bg);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-send:hover { filter: brightness(1.1); transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--mint-dim); border-radius: 99px; }
  </style>
</head>
<body>

<div class="chat-page">

  <!-- Header -->
  <div class="chat-page-header">
    <div class="ai-avatar">🌿</div>
    <div class="ai-meta">
      <div class="ai-name">SavvyStreet AI</div>
      <div class="ai-sub">Eco travel assistant</div>
    </div>
    <div class="ai-status">
      <div class="ai-status-dot"></div>
      Online
    </div>
  </div>

  <!-- Suggested prompts -->
  <div class="suggestions-bar">
    <div class="suggestion-chip" onclick="insertPrompt(this)">What's the AQI today?</div>
    <div class="suggestion-chip" onclick="insertPrompt(this)">Best eco mode for 8 km?</div>
    <div class="suggestion-chip" onclick="insertPrompt(this)">How do I reduce my carbon footprint?</div>
    <div class="suggestion-chip" onclick="insertPrompt(this)">Is it safe to cycle in poor AQI?</div>
    <div class="suggestion-chip" onclick="insertPrompt(this)">Compare EV vs public transit emissions</div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messages-area">
    <!-- Initial message injected by JS -->
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="chat-textarea"
      class="chat-textarea"
      placeholder="Ask about your trip, air quality, eco tips…"
      rows="1"
    ></textarea>
    <button id="btn-send" class="btn-send" title="Send">➤</button>
  </div>

</div><!-- /chat-page -->

<script>
  const API_BASE = '';
  let chatHistory = [];
  let msgCounter  = 0;

  // ── Init welcome message ──────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    appendMsg('ai', "Hi there! I'm SavvyStreet AI 🌿\nI can help with air quality insights, route eco-scores, and sustainable travel tips. What would you like to know?");

    // Auto-resize textarea
    const ta = document.getElementById('chat-textarea');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });

    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    document.getElementById('btn-send').addEventListener('click', sendMessage);
  });

  // ── Insert suggested prompt ───────────────────────
  function insertPrompt(el) {
    document.getElementById('chat-textarea').value = el.textContent;
    document.getElementById('chat-textarea').focus();
  }

  // ── Send message ──────────────────────────────────
  async function sendMessage() {
    const ta  = document.getElementById('chat-textarea');
    const msg = ta.value.trim();
    if (!msg) return;

    ta.value = '';
    ta.style.height = 'auto';
    appendMsg('user', msg);
    chatHistory.push({ role: 'user', content: msg });

    const btn = document.getElementById('btn-send');
    btn.disabled = true;

    const typingId = appendMsg('ai', '…', true);

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: chatHistory, context: {} }),
      });
      const data = await res.json();
      const reply = data.reply || data.error || 'No response.';
      replaceMsg(typingId, reply);
      chatHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      replaceMsg(typingId, '⚠️ Could not reach SavvyStreet AI. Check your connection.');
    } finally {
      btn.disabled = false;
    }
  }

  // ── Render helpers ────────────────────────────────
  function appendMsg(role, text, isTyping = false) {
    const id   = `m${++msgCounter}`;
    const area = document.getElementById('messages-area');
    const now  = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.innerHTML = `
      ${role === 'ai'
        ? `<div class="msg-avatar ai-av">AI</div>`
        : `<div class="msg-avatar user-av">You</div>`}
      <div id="${id}" class="msg-bubble ${role}${isTyping ? ' typing' : ''}">${text.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${now}</div>
    `;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
    return id;
  }

  function replaceMsg(id, text) {
    const el = document.getElementById(id);
    if (el) {
      el.innerHTML = text.replace(/\n/g, '<br>');
      el.classList.remove('typing');
    }
  }
</script>

</body>
</html>
